# Catch-all for requests whose Host doesn't match the API domain: direct hits
# on the bare Elastic IP (which bypass Cloudflare entirely) and the constant
# background of vulnerability scanners probing by address. 444 closes the
# connection with no response, so none of it ever reaches FastAPI.
#
# No __DOMAIN__ substitution here, so this is copied rather than rendered.
# Must remain the only default_server on :80/:443 -- nginx refuses to start
# with two, and the ticketing-backend blocks deliberately have none.
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    server_name _;

    # Refuse the TLS handshake outright, so this block needs no certificate
    # of its own (nginx >= 1.19.4). Cloudflare in Full mode sends SNI for the
    # API domain, which matches ticketing-backend-ssl and never lands here.
    ssl_reject_handshake on;
}
